server:
  host: 127.0.0.1
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    flyway:
      enabled: true
      locations: classpath:db/migration
app:
  jwt:
    secret: ${SECRET}
    access-expiration: 900000
    refresh-expiration: 86400000
  cors:
    allowedOrigins: http://localhost:8080